version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=memory
      - POSTGRES_PASSWORD=memory_password
      - POSTGRES_DB=hot_and_cold_memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d hot_and_cold_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=hot-and-cold-memory
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - VECTOR_DB_HOST=qdrant
      - VECTOR_DB_PORT=6333
      - METADATA_DB_URL=postgresql+asyncpg://memory:memory_password@postgres:5432/hot_and_cold_memory
      - CACHE_URL=redis://redis:6379/0
      - DOCUMENT_STORE_PATH=/app/data/documents
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_API_KEY=${LLM_API_KEY}
      - COMPRESSION_MODEL=${COMPRESSION_MODEL:-gpt-4o-mini}
      - COMPRESSION_MAX_TOKENS=${COMPRESSION_MAX_TOKENS:-256}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - MIGRATION_INTERVAL_MINUTES=${MIGRATION_INTERVAL_MINUTES:-60}
      - HOT_TIER_CAPACITY=${HOT_TIER_CAPACITY:-10000}
      - HOT_TIER_EVICT_PERCENT=${HOT_TIER_EVICT_PERCENT:-0.1}
      - MAX_UPLOAD_SIZE_BYTES=${MAX_UPLOAD_SIZE_BYTES:-52428800}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-60}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
    volumes:
      - document_store:/app/data/documents
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  qdrant_storage:
  postgres_data:
  redis_data:
  document_store:
